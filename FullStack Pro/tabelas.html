<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendendo Sobre tabelas</title>
</head>
<body>
<!-- 
  Tabela é composta de linhas que são compostas de celulas.
  >  <tr></tr> São linhas (São rows)
  >  <th></th> Define o cabeçalho de uma tabela.
  >  <td></td> Colocar nossos dados dentro da tabela.    
-->

<h1>Trabalhando com tabelas.</h1>

<table>
    <caption>Tabela de Serviços</caption>
    <tr>
        <th>Ordem</th>
        <th>Serviço</th>
        <th>Preço</th>
        <th>Status</th>
    </tr>

    <tr>
        <td>1</td>
        <td>Troca de vidro</td>
        <td>R$600.00</td>
        <td>Em andamento</td>
    </tr>
</table>

<h2>Eu estou gostando muito!</h2>
    
</body>
</html>
